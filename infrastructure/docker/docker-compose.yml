version: "3.9"

services:
  # ──────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gts-meet-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gts_meet
      POSTGRES_PASSWORD: gts_meet_password
      POSTGRES_DB: gts_meet_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gts_meet -d gts_meet_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (Pub/Sub, Cache, Sessions)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gts-meet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # LiveKit SFU Server (WebRTC Media)
  # ──────────────────────────────────────────────
  # livekit:
  #   image: livekit/livekit-server:latest
  #   container_name: gts-meet-livekit
  #   restart: unless-stopped
  #   ports:
  #     - "7880:7880"   # HTTP API
  #     - "7881:7881"   # RTC (WebRTC)
  #     - "7882:7882"   # TURN/TLS
  #   volumes:
  #     - ./livekit.yaml:/livekit.yaml
  #   command: --config /livekit.yaml --dev --node-ip=192.168.1.8
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  # ──────────────────────────────────────────────
  # MinIO (S3-compatible Object Storage)
  # ──────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gts-meet-minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
